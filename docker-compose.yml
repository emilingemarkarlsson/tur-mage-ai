services:
  mage:
    image: mageai/mageai:${MAGE_VERSION}
    command: mage start ${PROJECT_NAME}
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAGE_VERSION: ${MAGE_VERSION}
        PROJECT_NAME: ${PROJECT_NAME}
    environment:
      USER_CODE_PATH: /home/src/${PROJECT_NAME}
      ENV: ${ENV}
      DATA_LAKE_PATH: ${DATA_LAKE_PATH}
      GAMES_START_DATE: ${GAMES_START_DATE}
      GAMES_YEAR: ${GAMES_YEAR:-}
      DATA_LAKE_SINK: ${DATA_LAKE_SINK}
      S3_DATA_LAKE_PREFIX: ${S3_DATA_LAKE_PREFIX}
      S3_DATA_LAKE_BUCKET: ${S3_DATA_LAKE_BUCKET}
      REFRESH_USE_S3_FALLBACK_FOR_GAMES: ${REFRESH_USE_S3_FALLBACK_FOR_GAMES:-0}
      S3_SOURCE: ${S3_SOURCE}
      HETZNER_BUCKET: ${HETZNER_BUCKET}
      HETZNER_ENDPOINT: ${HETZNER_ENDPOINT}
      HETZNER_REGION: ${HETZNER_REGION}
      HETZNER_ACCESS_KEY: ${HETZNER_ACCESS_KEY}
      HETZNER_SECRET_KEY: ${HETZNER_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      MOTHERDUCK_TOKEN: ${MOTHERDUCK_TOKEN:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-gemini-flash}
      LITELLM_MAX_INSIGHTS: ${LITELLM_MAX_INSIGHTS:-5}
      MOTHERDUCK_DATABASE_NAME: ${MOTHERDUCK_DATABASE_NAME:-nhl}
    ports:
      - "6789:6789"
      - "8501:8501"
    deploy:
      resources:
        limits:
          memory: 6G
    volumes:
      - .:/home/src
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
