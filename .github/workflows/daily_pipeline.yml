name: NHL Daily Pipeline

on:
  schedule:
    # 07:00 UTC dagligen – analytics + SUI körs (SUI hoppar över om ingen ny data)
    # dimensions/seasonal/games/swe körs av Mage AI-instansen på Hetzner
    - cron: "0 7 * * *"
  workflow_dispatch:
    # Manuell trigger – kör båda jobben direkt (t.ex. vid felsökning)

jobs:
  run-sui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run sui_to_motherduck pipeline
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MINIO_ENDPOINT: https://minio-api.thehockeyanalytics.com
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          python3 -m venv /tmp/sui_venv
          /tmp/sui_venv/bin/pip install -q boto3 pandas duckdb
          # Kör med --max-age-hours 25: hoppar över om Crawlab inte körde idag
          /tmp/sui_venv/bin/python3 scripts/run_sui_pipeline.py --max-age-hours 25

  run-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run analytics_pipeline
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MOTHERDUCK_DATABASE_NAME: nhl
          LITELLM_BASE_URL: http://litellm-kkswc8gokk84c0o8oo84w44w.46.62.206.47.sslip.io
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_DEFAULT_MODEL: gemini-flash
          LITELLM_MAX_INSIGHTS: "5"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # refresh_feature_store.py uses INSTALL/LOAD motherduck extension –
          # no Python motherduck package needed, works with any supported DuckDB.
          python3 -m venv /tmp/analytics_venv
          /tmp/analytics_venv/bin/pip install -q openai python-dotenv pandas duckdb
          /tmp/analytics_venv/bin/python3 scripts/run_analytics_pipeline.py
