services:
  mage:
    image: mageai/mageai:${MAGE_VERSION:-latest}
    command: mage start ${PROJECT_NAME:-mage_project}
    environment:
      USER_CODE_PATH: /home/src/${PROJECT_NAME:-mage_project}
      ENV: production
      DATA_LAKE_PATH: ${DATA_LAKE_PATH:-/home/src/mage_project/data_lake}
      GAMES_START_DATE: ${GAMES_START_DATE:-2010-01-01}
      GAMES_BATCH_SIZE: ${GAMES_BATCH_SIZE:-10}
      DATA_LAKE_SINK: ${DATA_LAKE_SINK:-local}
      S3_DATA_LAKE_PREFIX: ${S3_DATA_LAKE_PREFIX:-nhl-analytics}
      S3_DATA_LAKE_BUCKET: ${S3_DATA_LAKE_BUCKET:-nhlhockey-data}
      REFRESH_USE_S3_FALLBACK_FOR_GAMES: ${REFRESH_USE_S3_FALLBACK_FOR_GAMES:-0}
      S3_SOURCE: ${S3_SOURCE:-hetzner}
      HETZNER_BUCKET: ${HETZNER_BUCKET:-nhlhockey-data}
      HETZNER_ENDPOINT: ${HETZNER_ENDPOINT}
      HETZNER_REGION: ${HETZNER_REGION:-eu-central}
      HETZNER_ACCESS_KEY: ${HETZNER_ACCESS_KEY}
      HETZNER_SECRET_KEY: ${HETZNER_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-nhl-gold}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_GOLD_BUCKET: ${MINIO_GOLD_BUCKET:-nhl-gold}
      MOTHERDUCK_TOKEN: ${MOTHERDUCK_TOKEN:-}
      MOTHERDUCK_DATABASE_NAME: ${MOTHERDUCK_DATABASE_NAME:-nhl}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL:-}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_DEFAULT_MODEL: ${LITELLM_DEFAULT_MODEL:-gemini-flash}
      LITELLM_MAX_INSIGHTS: ${LITELLM_MAX_INSIGHTS:-5}
      MAGE_DATABASE_CONNECTION_URL: postgresql+psycopg2://${POSTGRES_USER:-mage}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mage}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mage-ai.rule=Host(`mage.theunnamedroads.com`)"
      - "traefik.http.routers.mage-ai.entrypoints=https"
      - "traefik.http.routers.mage-ai.tls=true"
      - "traefik.http.routers.mage-ai.tls.certresolver=letsencrypt"
      - "traefik.http.services.mage-ai.loadbalancer.server.port=6789"
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 8G
    volumes:
      - mage_code:/home/src
      - mage_data_lake:/home/src/mage_project/data_lake
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mage}
      POSTGRES_USER: ${POSTGRES_USER:-mage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  mage_code:
  mage_data_lake:

networks:
  coolify:
    external: true
